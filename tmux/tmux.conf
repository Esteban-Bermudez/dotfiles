 # remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# allow mouse to copy selected text in tmux panes
set -g mouse on

# Fast Update Status Bar
set -g status-interval 1 

# use the | and - keys to split windows
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Hyperland Omarchy Bindings
if-shell "uname | grep -q Darwin" "source-file ~/.config/tmux/tmux-mac.conf"

unbind '"'
unbind %

# Copy / Paste like in vim
setw -g mode-keys vi
set -g status-keys vi
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

set-option -g history-limit 256000

# Status Bar Position
set-option -g status-position top

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g allow-passthrough on
# Optional: ensure the terminal is correctly identified
# set-option -g default-terminal screen-256color
set -g default-terminal "xterm-256color"

# set 24-bit colour
set-option -sa terminal-overrides ",xterm*:Tc"

# Pi
set -s extended-keys on
set -g extended-keys-format csi-u

# Mouse
bind -Troot MouseDown1StatusRight run -b "media-control toggle-play-pause"
bind -Troot MouseDown1StatusLeft run -b "tmux choose-session"

bind o run -b "tmux popup -E 'spotgo player'"
bind r run -b "tmux popup -E -w 80% -h 70% 'rbchat --no-notify'"
# bind o run -b "tmux popup -E -w 80% -h 70% 'bash -lc spotatui'"

# Theme
set-option -g status "on"
# set-option -g status-style bg=#2A2A37,fg=#C8C093
set-option -g status-style default
set-option -g message-style default

set-option -g status-left-length 50
set-option -g status-right-length 50
set -g status-justify absolute-centre

set-option -g status-left "#[fg=#cC3C51,bold] #S "

# File Directory Path
fd="#(echo #{pane_current_path} | sed 's#$HOME#~#g')"

# set -g status-right '#[bg=#(pomodoro tmux-color),fg=black] #(pomodoro status) #[bg=default,fg=default] '
# set -g status-right "#[fg=#A8A48D] #(~/.config/tmux/music.sh)"
# set -g status-right "#[fg=#A8A48D] #{?#{pane_current_path},$fd,} "
# set-option -g status-right "#[bg=green,fg=black] #(spotatui pb) "
# set-option -g status-right "#[fg=#f7C2E7] #{?#{pane_ssh_connected},󰣀 #H,}"

# spotgo https://github.com/Esteban-Bermudez/spotgo
set-option -g status-right "#[fg=green] #(spotgo player --one-line --no-progress --scroll 30) "

set-window-option -g window-status-current-style bg=default,fg=default
set-window-option -g window-status-separator ""
set-window-option -g window-status-current-format "#[bold] #I#[bold] #W#{?window_zoomed_flag, 󰬡,} "
set-window-option -g window-status-format "#[fg=#A8A48D] #I #W "

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# These plugins are Bash scripts; invoke Bash explicitly because tmux uses default-shell
# (zsh here), which otherwise returns 127 while loading them.
run-shell -b '/bin/bash ~/.config/tmux/tmux-current-pane-hostname/current_pane_hostname.tmux'
run-shell -b '/bin/bash ~/.config/tmux/tmux-resurrect/resurrect.tmux'
